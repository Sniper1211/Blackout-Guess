<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>排行榜 | 古诗词猜字游戏</title>
  <meta name="description" content="古诗词猜字游戏排行榜，查看最高分与最佳连击记录。" />
  <link rel="canonical" href="https://sniper1211.github.io/Blackout-Guess/leaderboard.html" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta property="og:title" content="排行榜 | 古诗词猜字游戏" />
  <meta property="og:description" content="查看最高分与最佳连击记录，挑战更高分数。" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://sniper1211.github.io/Blackout-Guess/leaderboard.html" />
  <meta property="og:image" content="https://sniper1211.github.io/Blackout-Guess/favicon.svg" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="stylesheet" href="styles.css?v=20260211-2" />
  <!-- Google Analytics 配置与初始化 -->
  <script src="js/ga-config.js"></script>
  <script src="js/analytics.js"></script>
  
</head>
<body>
  <nav class="site-nav" aria-label="主要导航">
    <a href="index.html" aria-label="返回首页">首页</a>
    <a href="leaderboard.html" aria-label="查看排行榜" class="active">排行榜</a>
    <a href="help.html" aria-label="查看游戏说明">游戏说明</a>
  </nav>
  <main>
  <div class="page-container">
    <div class="page-header">
      <div class="page-title">🏆 最高分排行榜</div>
      <div class="page-actions">
        <button id="btnRefresh" class="btn btn-outline">刷新</button>
        <a href="index.html" id="btnBack" class="btn">返回游戏</a>
        <a href="help.html" class="btn">游戏说明</a>
      </div>
    </div>

    <div id="lbStatus" class="lb-loading">正在加载排行榜…</div>
    <div class="lb-table-wrapper">
      <table id="lbTable" class="table lb-table" aria-live="polite" style="display:none">
        <thead>
          <tr>
            <th>排名</th>
            <th>用户名</th>
            <th>作品</th>
            <th>分数</th>
            <th>猜测</th>
            <th>用时</th>
            <th>作者</th>
            <th>日期</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <div id="lbEmpty" class="lb-empty" style="display:none">暂无记录，先回到游戏玩一局试试吧！</div>
    <div id="lbError" class="lb-error" style="display:none"></div>
  </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const medals = ['🥇','🥈','🥉'];
    const statusEl = document.getElementById('lbStatus');
    const tableEl = document.getElementById('lbTable');
    const tbodyEl = tableEl.querySelector('tbody');
    const emptyEl = document.getElementById('lbEmpty');
    const errorEl = document.getElementById('lbError');
    const btnRefresh = document.getElementById('btnRefresh');

    let isLoading = false;
    let loadingTimer = null;

    function startLoadingDots() {
      const frames = ['',' .',' ..',' ...'];
      let i = 0;
      clearLoadingDots();
      loadingTimer = setInterval(() => {
        statusEl.textContent = '正在加载排行榜' + frames[i];
        i = (i + 1) % frames.length;
      }, 400);
    }

    function clearLoadingDots() {
      if (loadingTimer) {
        clearInterval(loadingTimer);
        loadingTimer = null;
      }
    }

    function formatDate(iso) {
      try { return new Date(iso).toLocaleString(); } catch { return ''; }
    }

    function formatSeconds(sec) {
      if (typeof sec !== 'number') return '—';
      const s = Math.round(sec);
      const m = Math.floor(s / 60);
      const r = s % 60;
      return m > 0 ? `${m}分${r}秒` : `${r}秒`;
    }

    async function fetchLeaderboard(limit = 10) {
      if (isLoading) return;
      isLoading = true;
      statusEl.style.display = 'block';
      statusEl.textContent = '正在加载排行榜';
      startLoadingDots();
      tableEl.style.display = 'none';
      emptyEl.style.display = 'none';
      errorEl.style.display = 'none';
      tbodyEl.innerHTML = '';

      try {
        const url = localStorage.getItem('SUPABASE_URL');
        const key = localStorage.getItem('SUPABASE_ANON_KEY');

        let rows = null;
        if (window.supabase && url && key) {
          const client = window.supabase.createClient(url, key);
          const { data, error } = await client
            .from('game_sessions')
            .select('*')
            .order('score', { ascending: false })
            .order('created_at', { ascending: false })
            .limit(limit);
          if (error) throw new Error(error.message);
          rows = data || [];
        }

        if (!rows || rows.length === 0) {
          // 回退到本地最高分
          try {
            const highScores = JSON.parse(localStorage.getItem('highScores') || '[]');
            if (!highScores.length) {
            clearLoadingDots();
            statusEl.style.display = 'none';
            emptyEl.style.display = 'block';
            isLoading = false;
            return;
          }
            clearLoadingDots();
            statusEl.style.display = 'none';
            tableEl.style.display = 'table';
            highScores.forEach((score, index) => {
              const tr = document.createElement('tr');
              const medal = index < 3 ? medals[index] : `${index + 1}`;
              tr.innerHTML = `
                <td class="mono">${medal}</td>
                <td class="mono">${(localStorage.getItem('username') || '—')}</td>
                <td>《${score.title}》</td>
                <td class="mono">${score.score}</td>
                <td class="mono">${score.guessCount ?? '—'}</td>
                <td class="mono">${score.time ?? '—'}</td>
                <td class="mono">—</td>
                <td class="mono">${formatDate(score.date)}</td>
              `;
              tbodyEl.appendChild(tr);
            });
            isLoading = false;
            return;
          } catch (e) {
            errorEl.textContent = '读取本地排行榜失败';
            errorEl.style.display = 'block';
            statusEl.style.display = 'none';
            isLoading = false;
            return;
          }
        }

        // 渲染在线排行榜
        clearLoadingDots();
        statusEl.style.display = 'none';
        tableEl.style.display = 'table';
        rows.forEach((row, index) => {
          const tr = document.createElement('tr');
          const medal = index < 3 ? medals[index] : `${index + 1}`;
          tr.innerHTML = `
            <td class="mono">${medal}</td>
            <td class="mono">${row.username || '—'}</td>
            <td>《${row.poem_title || '未知作品'}》</td>
            <td class="mono">${row.score}</td>
            <td class="mono">${row.guess_count ?? '—'}</td>
            <td class="mono">${formatSeconds(row.duration_seconds)}</td>
            <td>${(row.author || '') + (row.dynasty ? ` (${row.dynasty})` : '')}</td>
            <td class="mono">${formatDate(row.created_at)}</td>
          `;
          tbodyEl.appendChild(tr);
        });
      } catch (e) {
        clearLoadingDots();
        errorEl.textContent = `加载排行榜失败：${e.message || e}`;
        errorEl.style.display = 'block';
        statusEl.style.display = 'none';
      } finally {
        clearLoadingDots();
        isLoading = false;
      }
    }

    btnRefresh.addEventListener('click', () => fetchLeaderboard());
    document.addEventListener('DOMContentLoaded', () => fetchLeaderboard());
  </script>
</body>
</html>
